name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Resolve version from tag
        id: meta
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: >-
          msbuild src/LabTetherAgent/LabTetherAgent.csproj
          -t:Restore
          -p:RuntimeIdentifier=win-x64
          -p:Platform=x64

      - name: Publish
        run: >-
          msbuild src/LabTetherAgent/LabTetherAgent.csproj
          -t:Publish
          -p:Configuration=Release
          -p:RuntimeIdentifier=win-x64
          -p:Platform=x64
          -p:SelfContained=true
          -p:WindowsPackageType=None
          -p:EnableMsixTooling=false
          -p:GenerateAppxPackageOnBuild=false
          -p:PublishDir=..\..\publish\win-x64\

      - name: Package release artifact
        shell: bash
        run: |
          cd publish/win-x64
          7z a -tzip "../../labtether-agent-win-x64.zip" .
          cd ../..
          sha256sum "labtether-agent-win-x64.zip" > "labtether-agent-win-x64.zip.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LabTether Windows Agent ${{ steps.meta.outputs.version }}"
          files: |
            labtether-agent-win-x64.zip
            labtether-agent-win-x64.zip.sha256
