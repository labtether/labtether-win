name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - run: dotnet restore
        working-directory: src/LabTetherAgent
      - run: dotnet build --no-restore
        working-directory: src/LabTetherAgent
      - run: dotnet test --no-build
        working-directory: tests/LabTetherAgent.Tests
